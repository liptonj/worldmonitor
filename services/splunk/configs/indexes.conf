# Docker logs index
[docker_logs]
homePath = $SPLUNK_DB/docker_logs/db
coldPath = $SPLUNK_DB/docker_logs/colddb
thawedPath = $SPLUNK_DB/docker_logs/thaweddb
maxDataSize = auto_high_volume
frozenTimePeriodInSecs = 2592000  # 30 days

# Application-specific indexes (optional)
[gateway_logs]
homePath = $SPLUNK_DB/gateway_logs/db
coldPath = $SPLUNK_DB/gateway_logs/colddb
thawedPath = $SPLUNK_DB/gateway_logs/thaweddb

[orchestrator_logs]
homePath = $SPLUNK_DB/orchestrator_logs/db
coldPath = $SPLUNK_DB/orchestrator_logs/colddb
thawedPath = $SPLUNK_DB/orchestrator_logs/thaweddb

[worker_logs]
homePath = $SPLUNK_DB/worker_logs/db
coldPath = $SPLUNK_DB/worker_logs/colddb
thawedPath = $SPLUNK_DB/worker_logs/thaweddb
