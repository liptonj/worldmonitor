# Docker container log parsing
[docker:container]
SHOULD_LINEMERGE = false
TRUNCATE = 0
TIME_PREFIX = \"time\":\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%9NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
KV_MODE = json

# Field extractions for structured logs
EXTRACT-container_name = \"attrs\":\{[^\}]*\"name\":\"(?<container_name>[^\"]+)\"
EXTRACT-service_name = \"attrs\":\{[^\}]*\"service\":\"(?<service_name>[^\"]+)\"
EXTRACT-log_level = \"log\":\"[^\"]*(?<log_level>INFO|ERROR|WARN|DEBUG)

# JSON logs from Python/FastAPI services
[_json]
KV_MODE = json
INDEXED_EXTRACTIONS = json
TIME_PREFIX = timestamp
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
TIMESTAMP_FIELDS = timestamp,time,@timestamp
