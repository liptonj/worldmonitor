# Splunk Indexes Configuration
# Place this file in: $SPLUNK_HOME/etc/system/local/indexes.conf
# Or for an app: $SPLUNK_HOME/etc/apps/your_app/local/indexes.conf
# After creating/editing, restart Splunk or run: splunk reload deploy-server -class <server-class>

# Main Docker logs index
[docker_logs]
homePath = $SPLUNK_DB/docker_logs/db
coldPath = $SPLUNK_DB/docker_logs/colddb
thawedPath = $SPLUNK_DB/docker_logs/thaweddb
# Auto-sized for high volume logs
maxDataSize = auto_high_volume
# Retention: freeze (archive) data older than 30 days (2592000 seconds)
frozenTimePeriodInSecs = 2592000
# Maximum total size before oldest data is frozen (500GB)
maxTotalDataSizeMB = 512000

# Optional: Service-specific indexes for better organization

[gateway_logs]
homePath = $SPLUNK_DB/gateway_logs/db
coldPath = $SPLUNK_DB/gateway_logs/colddb
thawedPath = $SPLUNK_DB/gateway_logs/thaweddb
maxDataSize = auto_high_volume
frozenTimePeriodInSecs = 2592000

