services:
  # Base image — build only, not run in production
  relay-base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: relay-base:latest
    profiles:
      - build-base

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mounts /var/run/docker.sock for auto-updates — known security tradeoff for self-hosted
  watchtower:
    image: containrrr/watchtower:1.7.2
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["--interval", "60", "--cleanup", "--include-stopped"]
    networks:
      - relay-internal

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - GATEWAY_GRPC_PORT=50051
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - WORKER_HOST=worker
      - WORKER_GRPC_PORT=50052
      - AI_ENGINE_HOST=ai-engine
      - AI_ENGINE_GRPC_PORT=50053
      - LOG_LEVEL=info

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - WORKER_GRPC_PORT=50052
      - LOG_LEVEL=info
    deploy:
      replicas: 3

  ais-processor:
    build:
      context: .
      dockerfile: ais-processor/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - LOG_LEVEL=info

  ingest-telegram:
    build:
      context: .
      dockerfile: ingest-telegram/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - LOG_LEVEL=info

  ai-engine:
    build:
      context: .
      dockerfile: ai-engine/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - AI_ENGINE_GRPC_PORT=50053
      - LOG_LEVEL=info

networks:
  relay-internal:
    driver: bridge
