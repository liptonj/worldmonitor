services:
  # Base image — build only, not run in production
  relay-base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: relay-base:latest
    profiles:
      - build-base

  redis:
    image: redis:7-alpine
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--save", "300 10", "--save", "60 10000", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mounts /var/run/docker.sock for auto-updates — known security tradeoff for self-hosted
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["--interval", "60", "--cleanup", "--include-stopped"]
    networks:
      - relay-internal

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID:-}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET:-}
      - RELAY_SHARED_SECRET=${RELAY_SHARED_SECRET:-}
      - RELAY_AUTH_HEADER=${RELAY_AUTH_HEADER:-x-relay-key}
      - VITE_WS_RELAY_TOKEN=${VITE_WS_RELAY_TOKEN:-}
      - VERCEL_APP_URL=${VERCEL_APP_URL:-}
      - ALLOW_UNAUTHENTICATED_RELAY=${ALLOW_UNAUTHENTICATED_RELAY:-false}
      - RELAY_METRICS_WINDOW_SECONDS=${RELAY_METRICS_WINDOW_SECONDS:-60}
      - PORT=${PORT:-3004}
      - GATEWAY_GRPC_PORT=50051
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - WORKER_HOST=worker
      - WORKER_GRPC_PORT=50052
      - AI_ENGINE_HOST=ai-engine
      - AI_ENGINE_GRPC_PORT=50053
      - LOG_LEVEL=info
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - WORKER_GRPC_PORT=50052
      - FRED_API_KEY=${FRED_API_KEY:-}
      - EIA_API_KEY=${EIA_API_KEY:-}
      - WTO_API_KEY=${WTO_API_KEY:-}
      - NASA_FIRMS_API_KEY=${NASA_FIRMS_API_KEY:-}
      - ACLED_ACCESS_TOKEN=${ACLED_ACCESS_TOKEN:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - OREF_PROXY_AUTH=${OREF_PROXY_AUTH:-}
      - UCDP_ACCESS_TOKEN=${UCDP_ACCESS_TOKEN:-}
      - AVIATIONSTACK_API_KEY=${AVIATIONSTACK_API_KEY:-}
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID:-}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET:-}
      - LOG_LEVEL=info
    deploy:
      replicas: 3

  ais-processor:
    build:
      context: .
      dockerfile: ais-processor/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - LOG_LEVEL=info

  ingest-telegram:
    build:
      context: .
      dockerfile: ingest-telegram/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    volumes:
      - ./data/telegram-channels.json:/app/data/telegram-channels.json:ro
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_SESSION=${TELEGRAM_SESSION}
      - TELEGRAM_CHANNEL_SET=${TELEGRAM_CHANNEL_SET:-full}
      - TELEGRAM_CHANNELS_FILE=/app/data/telegram-channels.json
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - LOG_LEVEL=info
      - TELEGRAM_POLL_INTERVAL_MS=${TELEGRAM_POLL_INTERVAL_MS:-60000}
      - TELEGRAM_STARTUP_DELAY_MS=${TELEGRAM_STARTUP_DELAY_MS:-60000}
      - TELEGRAM_RATE_LIMIT_MS=${TELEGRAM_RATE_LIMIT_MS:-800}
      - TELEGRAM_MAX_TEXT_CHARS=${TELEGRAM_MAX_TEXT_CHARS:-800}
      - TELEGRAM_MAX_FEED_ITEMS=${TELEGRAM_MAX_FEED_ITEMS:-200}

  ai-engine:
    build:
      context: .
      dockerfile: ai-engine/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - relay-internal
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen/qwen3.5-9b}
      - OLLAMA_MAX_TOKENS=${OLLAMA_MAX_TOKENS:-1500}
      - OLLAMA_BEARER_TOKEN=${OLLAMA_BEARER_TOKEN:-}
      - GATEWAY_HOST=gateway
      - GATEWAY_GRPC_PORT=50051
      - AI_ENGINE_GRPC_PORT=50053
      - LOG_LEVEL=info

volumes:
  redis-data:

networks:
  relay-internal:
    driver: bridge
