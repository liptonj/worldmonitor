services:
  redis:
    restart: always
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]

  gateway:
    image: sliptronic/worldrelay_gateway:latest
    restart: always

  orchestrator:
    image: sliptronic/worldrelay_orchestrator:latest
    restart: always

  worker:
    image: sliptronic/worldrelay_worker:latest
    restart: always
    deploy:
      replicas: 4

  ais-processor:
    image: sliptronic/worldrelay_ais-processor:latest
    restart: always

  ingest-telegram:
    image: sliptronic/worldrelay_ingest-telegram:latest
    restart: always

  ai-engine:
    image: sliptronic/worldrelay_ai-engine:latest
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - gateway
    networks:
      - relay-internal
    profiles:
      - tunnel

volumes:
  redis-data:
