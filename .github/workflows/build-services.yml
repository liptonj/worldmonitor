name: Build Relay Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/build-services.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/build-services.yml'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to Docker Hub'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: relay-services-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: (github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.push_images == 'true')
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5.4.0
        with:
          context: ./services
          file: ./services/Dockerfile.base
          push: ${{ (github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.push_images == 'true') }}
          tags: |
            sliptronic/worldrelay_base:${{ github.sha }}
            sliptronic/worldrelay_base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-services:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - orchestrator
          - worker
          - ais-processor
          - ingest-telegram
          - ai-engine
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: (github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.push_images == 'true')
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare base image
        run: |
          docker pull sliptronic/worldrelay_base:latest && \
            docker tag sliptronic/worldrelay_base:latest relay-base:latest || \
            docker build -f services/Dockerfile.base -t relay-base:latest ./services

      - uses: docker/build-push-action@v5.4.0
        with:
          context: ./services
          file: ./services/${{ matrix.service }}/Dockerfile
          push: ${{ (github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.push_images == 'true') }}
          tags: |
            sliptronic/worldrelay_${{ matrix.service }}:${{ github.sha }}
            sliptronic/worldrelay_${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
