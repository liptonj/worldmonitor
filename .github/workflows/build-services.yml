name: Build Relay Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'

concurrency:
  group: relay-services-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5.4.0
        with:
          context: ./services
          file: ./services/Dockerfile.base
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/relay-base:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/relay-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-services:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - orchestrator
          - worker
          - ais-processor
          - ingest-telegram
          - ai-engine
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare base image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/relay-base:latest && \
            docker tag ghcr.io/${{ github.repository_owner }}/relay-base:latest relay-base:latest || \
            docker build -f services/Dockerfile.base -t relay-base:latest ./services

      - uses: docker/build-push-action@v5.4.0
        with:
          context: ./services
          file: ./services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/relay-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/relay-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
