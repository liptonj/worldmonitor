syntax = "proto3";
package worldmonitor.intelligence.v1;

import "sebuf/http/annotations.proto";

message GetGlobalIntelDigestRequest {
  bool force_refresh = 1 [(sebuf.http.query) = { name: "force_refresh" }];
}

message GetGlobalIntelDigestResponse {
  string digest = 1;
  string model = 2;
  string provider = 3;
  string generated_at = 4;
}
